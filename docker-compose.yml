services:
  backend:
    build: ./backend
    container_name: strata-backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/.data/strata.db
    volumes:
      - ./backend/.data:/app/.data
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed && node dist/main.js"

  front:
    build: ./front
    container_name: strata-front
    ports:
      - "4321:4321"
    environment:
      - PUBLIC_API_URL=http://backend:3000/api/v1
    depends_on:
      - backend

  docs:
    image: strata-docs
    build:
      context: ./docs
    container_name: strata-docs
    ports:
      - "8001:8000"
    volumes:
      - ./docs:/site
