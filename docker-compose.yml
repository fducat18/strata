# Strata — single Docker Compose file
#
# Two flavours, controlled by env vars (set via the npm shortcuts below):
#
#   npm run docker:dev   → development (NODE_ENV=development)
#   npm run docker:prod  → production  (NODE_ENV=production, restart=always)
#
# Equivalent raw commands:
#   docker-compose up --build
#   NODE_ENV=production RESTART_POLICY=always docker-compose up --build
#
# Swagger UI is always available at /swagger (both dev and prod).
# All overrides go through env interpolation so we keep ONE compose file.
# Resource caps (mem_limit / cpus) are intentionally not set here; add them
# locally if you run this on a constrained host.

services:
  backend:
    build: ./backend
    container_name: strata-backend
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/.data/${DB_FILE:-strata-dev.db}
      - NODE_ENV=${NODE_ENV:-development}
    volumes:
      # Bind-mount for local dev. If the non-root container user can't write,
      # run: chmod 777 backend/.data (or chown to UID 1000).
      - ./backend/.data:/app/.data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  front:
    build:
      context: ./front
      args:
        PUBLIC_API_URL: http://localhost:3000/api/v1
    container_name: strata-front
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "6543:6543"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
    depends_on:
      backend:
        condition: service_healthy

  docs:
    build:
      context: ./docs
    container_name: strata-docs
    restart: ${RESTART_POLICY:-unless-stopped}
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8001/docs/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
