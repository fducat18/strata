server {
    listen 8001;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Redirect bare root to /docs/
    location = / {
        return 302 /docs/;
    }

    # Serve the Astro Starlight static site
    location /docs/ {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /docs/404.html;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
