name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/main-docs-ci.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build Astro Starlight site
        working-directory: docs
        run: npm run build

      - name: Prepare deployment with /docs path
        run: |
          mkdir -p deploy/docs
          cp -r docs/dist/* deploy/docs/

      - name: Create root redirect to /docs
        run: |
          cat > deploy/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Redirecting to Strata Documentation</title>
            <meta http-equiv="refresh" content="0; url=/docs/">
            <link rel="canonical" href="/docs/">
          </head>
          <body>
            <p>Redirecting to <a href="/docs/">Strata Documentation</a>...</p>
            <script>window.location.href = "/docs/";</script>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
