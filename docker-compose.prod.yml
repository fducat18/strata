# Production-ish override for the Strata stack.
# Adds resource limits, an `always` restart policy, and disables Swagger.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Notes:
#   - `mem_limit` / `cpus` are the v2 (non-Swarm) compose keys, honored by
#     `docker compose up`. Swarm-style `deploy.resources` is intentionally not
#     used here so this works with plain Docker Engine.

services:
  backend:
    restart: always
    mem_limit: 512m
    cpus: "1.0"
    environment:
      - DATABASE_URL=file:/app/.data/strata.db
      - NODE_ENV=production
      - ENABLE_SWAGGER=false

  front:
    restart: always
    mem_limit: 256m
    cpus: "0.5"
    environment:
      - PUBLIC_API_URL=http://backend:3000/api/v1
      - NODE_ENV=production

  docs:
    restart: always
    mem_limit: 256m
    cpus: "0.5"
