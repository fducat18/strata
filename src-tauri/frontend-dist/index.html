<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strata</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .loader {
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #888; font-size: 14px; }
  </style>
</head>
<body>
  <div class="loader">
    <div class="spinner"></div>
    <h1>Strata</h1>
    <p>Starting services…</p>
  </div>
  <script>
    // Tauri emits backend-ready with desktop bootstrap payload.
    const { listen } = window.__TAURI__?.event ?? {};
    if (listen) {
      listen('backend-ready', ({ payload }) => {
        if (!payload?.ready) {
          document.querySelector('p').textContent = 'Backend failed to start. Check logs.';
          return;
        }
        sessionStorage.setItem('STRATA_DESKTOP_BACKEND_URL', payload.backend_api_url);
        sessionStorage.setItem('STRATA_DESKTOP_TOKEN', payload.desktop_token);
        window.location.href = '/app/';
      });
    }
  </script>
</body>
</html>
